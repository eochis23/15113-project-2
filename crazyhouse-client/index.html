<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazyhouse Sandbox</title>
    
    <script src="/auth.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        h1 {
            color: #112;
            text-shadow: 1px 1px 2px #888888;
        }

        img, cg-piece {
            -webkit-user-drag: none;
        }

        input, textarea {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .game-container {
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: stretch; 
            gap: 20px; 
            width: 100%;
            max-width: 1250px; 
            margin: 20px auto;
        }

        .board-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #board {
            width: 500px;
            height: 500px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        /* Profile Cards */
        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 8px 12px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 4px;
            background-color: #ddd;
            object-fit: cover;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .username {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .rating {
            color: #777;
            font-size: 13px;
        }

        .record {
            color: #999;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Pockets */
        .pocket {
            width: 90px;
            height: auto; 
            min-height: 500px;
            background-color: #beeeaf;
            border-radius: 8px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            padding: 10px 5px;
            box-sizing: border-box;
            box-shadow: inset 0px 2px 5px rgba(0,0,0,0.1);
        }

        .pocket-label {
            font-weight: bold;
            color: #112;
            margin-bottom: 15px;
            text-align: center;
        }

        .pocket-slot {
            position: relative;
            width: 45px;
            height: 45px;
            margin-top: 8px;
        }

        .pocket-slot cg-piece {
            width: 45px;
            height: 45px;
            background-size: cover;
            cursor: grab;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .piece-count {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #222;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid #beeeaf;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Piece SVGs */
        .pocket cg-piece.white.pawn { background-image: url('https://lichess1.org/assets/piece/cburnett/wP.svg'); }
        .pocket cg-piece.white.knight { background-image: url('https://lichess1.org/assets/piece/cburnett/wN.svg'); }
        .pocket cg-piece.white.bishop { background-image: url('https://lichess1.org/assets/piece/cburnett/wB.svg'); }
        .pocket cg-piece.white.rook { background-image: url('https://lichess1.org/assets/piece/cburnett/wR.svg'); }
        .pocket cg-piece.white.queen { background-image: url('https://lichess1.org/assets/piece/cburnett/wQ.svg'); }
        .pocket cg-piece.black.pawn { background-image: url('https://lichess1.org/assets/piece/cburnett/bP.svg'); }
        .pocket cg-piece.black.knight { background-image: url('https://lichess1.org/assets/piece/cburnett/bN.svg'); }
        .pocket cg-piece.black.bishop { background-image: url('https://lichess1.org/assets/piece/cburnett/bB.svg'); }
        .pocket cg-piece.black.rook { background-image: url('https://lichess1.org/assets/piece/cburnett/bR.svg'); }
        .pocket cg-piece.black.queen { background-image: url('https://lichess1.org/assets/piece/cburnett/bQ.svg'); }

        




        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            width: 260px;
            height: 500px;     
            margin-top: 76px;  
            box-sizing: border-box;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            overflow: hidden; 
        }

        .move-history-container {
            flex: 1; 
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid #ddd; 
        }

        .chat-container {
            height: 180px; 
            flex: none;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-history {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }

        .chat-input-area {
            display: flex;
            flex: none; 
            border-top: 1px solid #ddd;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }

        #chat-send {
            padding: 10px 15px;
            background: #f0f8ff;
            border: none;
            border-left: 1px solid #ddd;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            color: #333;
        }

        .game-controls {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #f9f9f9; 
            border-top: 1px solid #ddd; 
        }

        .control-btn {
            flex: 1;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            transition: all 0.2s;
        }

        /* Promotion UI */
        #promotion-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            z-index: 100;
        }

        .promotion-dialog {
            background: #f0f8ff;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
        }

        .promo-piece {
            width: 60px;
            height: 60px;
            background-size: cover;
            cursor: pointer;
            border-radius: 50%;
        }

        .promotion-dialog.white .promo-queen { background-image: url('https://lichess1.org/assets/piece/cburnett/wQ.svg'); }
        .promotion-dialog.white .promo-rook { background-image: url('https://lichess1.org/assets/piece/cburnett/wR.svg'); }
        .promotion-dialog.white .promo-bishop { background-image: url('https://lichess1.org/assets/piece/cburnett/wB.svg'); }
        .promotion-dialog.white .promo-knight { background-image: url('https://lichess1.org/assets/piece/cburnett/wN.svg'); }
        .promotion-dialog.black .promo-queen { background-image: url('https://lichess1.org/assets/piece/cburnett/bQ.svg'); }
        .promotion-dialog.black .promo-rook { background-image: url('https://lichess1.org/assets/piece/cburnett/bR.svg'); }
        .promotion-dialog.black .promo-bishop { background-image: url('https://lichess1.org/assets/piece/cburnett/bB.svg'); }
        .promotion-dialog.black .promo-knight { background-image: url('https://lichess1.org/assets/piece/cburnett/bN.svg'); }
        #board.board-brown cg-board {
            background-image: url('https://lichess1.org/assets/images/board/brown.png') !important;
        }

        #board.board-green cg-board {
            background-image: url('https://lichess1.org/assets/images/board/green.png') !important;
        }

        #board.board-blue cg-board {
            background-image: url('https://lichess1.org/assets/images/board/blue.png') !important;
        }

        cg-board {
            background-size: cover !important;
        }

        #board {
            width: 500px !important;
            height: 500px !important;
            display: block !important;
        }
    </style>
</head>
<body>

    <div id="login-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #ffffe0; z-index: 999; position: absolute; width: 100%; top: 0; left: 0;">
        <h1 style="font-size: 3vw; color: #112; text-shadow: none; margin: 0 0 20px 0;">Please log in</h1>
        <div id="buttonDiv"></div>
        <p id="error-message" style="color: red; display: none; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div id="content-container" style="display: none;">
        <h1>Crazyhouse Sandbox</h1>

        <div class="game-container cburnett">
            <div class="pocket" id="white-pocket">
                <span class="pocket-label">White<br>Reserves</span>
            </div>

            <div class="board-column">
                <div class="user-card opponent">
                    <img id="opponent-avatar" src="https://ui-avatars.com/api/?name=?&background=ddd&color=999" alt="Opponent" class="avatar">
                    <div class="user-info">
                        <span id="opponent-username" class="username">Waiting for opponent...</span>
                        <span id="opponent-record" class="record">0W - 0L - 0D</span>
                    </div>
                </div>

                <div style="position: relative;">
                    <div id="board"></div> 
                    
                    <div id="promotion-wrapper">
                        <div id="promotion-dialog" class="promotion-dialog">
                            <div class="promo-piece promo-queen" data-role="queen"></div>
                            <div class="promo-piece promo-knight" data-role="knight"></div>
                            <div class="promo-piece promo-rook" data-role="rook"></div>
                            <div class="promo-piece promo-bishop" data-role="bishop"></div>
                        </div>
                    </div>
                </div>

                <div class="user-card player">
                    <img id="player-avatar" src="https://ui-avatars.com/api/?name=Me" alt="You" class="avatar">
                    <div class="user-info">
                        <span id="player-username" class="username">Eric Ochis</span>
                        <span id="player-record" class="record">0W - 0L - 0D</span>
                    </div>
                </div>

            </div>
            <div class="pocket" id="black-pocket">
                <span class="pocket-label">Black<br>Reserves</span>
            </div>

            <div class="sidebar">
                <div class="move-history-container" id="move-history"></div>
                <div class="chat-container">
                    <div class="chat-history" id="chat-history"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                        <button id="chat-send">Send</button>
                    </div>
                </div>
                <div class="game-controls">
                    <button id="btn-draw" class="control-btn">½ Offer Draw</button>
                    <button id="btn-resign" class="control-btn">⚐ Resign</button>
                    <button id="btn-new-game" class="control-btn" style="display: none;">+ New Game</button>
                </div>
            <select id="board-theme-selector">
                <option value="board-brown">Classic Wood</option>
                <option value="board-green">Tournament Green</option>
                <option value="board-blue">Ocean Blue</option>
            </select>
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            if (sessionStorage.getItem('cmuAuth') === 'true') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('content-container').style.display = 'block';
                
                const savedUser = sessionStorage.getItem('userData');
                if (savedUser) {
                    const user = JSON.parse(savedUser);
                    // Timeout ensures main.js is loaded and ready
                    setTimeout(() => {
                        if (window.updatePlayerProfile) {
                            window.updatePlayerProfile(user);
                        }
                    }, 400); 
                }
            } else {
                google.accounts.id.initialize({
                    client_id: "526379188595-uteji192qi0fc36aheui50ogbgkei087.apps.googleusercontent.com",
                    callback: handleCredentialResponse,
                    hd: "andrew.cmu.edu"
                });
                google.accounts.id.renderButton(
                    document.getElementById("buttonDiv"),
                    { theme: "outline", size: "large" }  
                );
            }
        }
    </script>
    <script type="module" src="/main.js"></script>
</body>
</html>
